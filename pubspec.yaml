name: ams_mobile
description: Asset Management System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests
  http: ^1.1.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Connectivity check
  connectivity_plus: ^5.0.2
  
  # Push notifications
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.0.0
  
  # File/Image picking
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
